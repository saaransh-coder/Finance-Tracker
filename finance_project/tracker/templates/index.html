{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Tracker</title>

    <link rel="stylesheet" href="{% static 'style.css' %}">

</head>

<body>
    <h1>Finance Tracker - Money in your hand $$$</h1>

    <div class="container">
        <h4>Your Balance</h4>
        <h1 id="balance">$0.00</h1>

        <div class="inc-exp-container">
            <div>
                <h4>Income</h4>
                <p id="money-plus">+$0.00</p>
            </div>
            <div>
                <h4>Expense</h4>
                <p id="money-minus">-$0.00</p>
            </div>
        </div>

        <h3>History</h3>
        <ul id="list"></ul>


        <h3>Add New Transaction</h3>
        <form action="" id="form">

            <div class="form-control">
                <label for="text">Text</label>
                <input type="text" id="text" placeholder="Enter the text...">
            </div>

            <div class="form-control">
                <label for="amount">Amount<br />
                    (Negative - Expense, Positive - Income)
                </label>
                <input type="text" id="amount" placeholder="Enter the amount...">
            </div>

            <button id="btn">Add Transaction</button>

        </form>
    </div>


    <script src="{% static 'script.js' %}"></script>
</body>

</html>
